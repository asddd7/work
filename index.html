<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>TES</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #020617, #0f172a);
        color: #e5e7eb;
        overflow: hidden;
    }

    video.bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: 0.6s;
        z-index: -1;
    }

    .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: -1;
    }

    .container {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 30px;
    }

    h1 {
        font-size: 64px;
        letter-spacing: 2px;
        color: #38bdf8;
    }

    .buttons {
        display: flex;
        gap: 20px;
    }

    button {
        padding: 14px 28px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #0ea5e9, #2563eb);
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(56,189,248,0.4);
    }

    .result {
        font-size: 22px;
        margin-top: 20px;
        color: #e0f2fe;
        min-height: 30px;
    }
</style>
</head>
<body>

<video id="bgVideo" class="bg-video" muted loop></video>
<div class="overlay"></div>

<audio id="music"></audio>

<div class="container">
    <h1>TES</h1>

    <div class="buttons">
        <button onclick="showAnime()">TES</button>
        <button onclick="showSong()">TES</button>
        <button onclick="showMovie()">TES</button>
    </div>

    <div class="result" id="resultText"></div>
</div>

<script>
    const video = document.getElementById('bgVideo');
    const music = document.getElementById('music');
    const result = document.getElementById('resultText');

    function resetMedia() {
        video.style.opacity = 0;
        video.pause();
        music.pause();
    }

    function showAnime() {
        resetMedia();
        result.textContent = "Bleach";
        video.src = "bleach.mp4";
        video.style.opacity = 1;
        video.play();
    }

    function showSong() {
        resetMedia();
        result.textContent = "Don't Look Back in Anger - Oasis";
        music.src = "oasis.mp3";
        music.play();
    }

    function showMovie() {
        resetMedia();
        result.textContent = "Fight Club";
        video.src = "fightclub.mp4";
        video.style.opacity = 1;
        video.play();
    }
</script>

</body>
</html>
